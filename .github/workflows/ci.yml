name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t flask-app .

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        continue-on-error: true

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint Kubernetes YAML
        run: yamllint k8s.yaml
        continue-on-error: true

      - name: Scan filesystem with Trivy (SCA)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true # Permet de passer à la suite même si Trivy trouve des erreurs
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '1' 
          severity: 'CRITICAL,HIGH'

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true # Permet de voir aussi le résultat du scan d'image
        with:
          image-ref: flask-app
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Test Politique Sécurité (Conftest)
        uses: instrumenta/conftest-action@master
        with:
          files: k8s.yaml
          policy: policy/ # Assure-toi que tes règles .rego sont dans ce dossier
