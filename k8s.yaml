apiVersion: apps/v1
kind: Pod
metadata:
  name: flask-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
      - name: flask-container
        image: mon-app-flask:latest
        ports:
        - containerPort: 5000
        securityContext:
          allowPrivilegeEscalation: true
